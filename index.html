<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MINERAVIX v4 — AI Geo Insight Engine | GEOCEE</title>
<link rel="preload" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/></noscript>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js" defer></script>
<style>
:root{
  --navy:#1A3A5C;--navy2:#0F2744;--blue:#2563EB;--blue-lt:#EFF6FF;--blue-bd:#BFDBFE;
  --pg:#F4F7FB;--panel:#FFFFFF;--bd:#E2EAF4;--bd2:#CBD5E1;
  --t1:#1A3A5C;--t2:#475569;--t3:#94A3B8;--t4:#CBD5E1;
  --hi:#16A34A;--mi:#D97706;--lo:#DC2626;
  --coal:#78350F;--mineral:#DC2626;--wiup:#2563EB;--geo:#64748B;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--fw,sans-serif);font-size:13px;color:var(--t1)}
#splash{position:fixed;inset:0;background:var(--navy);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center}
#splash.hide{opacity:0;pointer-events:none}
#app{display:none;height:100vh;flex-direction:column}
#app.ready{display:flex}
.sp-logo{font-size:42px;font-weight:500;color:#fff}
.sp-sub{font-size:11px;color:#7AA3CC;margin-top:6px}
.sp-msg{font-size:11px;color:#7AA3CC;margin-top:10px;min-height:16px}
#map-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
#map{flex:1}
#topbar{height:44px;background:var(--navy);display:flex;align-items:center;padding:0 14px;gap:10px}
.tb-name{font-size:14px;font-weight:600;color:#fff}
.tb-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);padding:5px 12px;font-size:11px;color:#E2EAF4;cursor:pointer;border-radius:4px}
.tb-btn:hover{background:rgba(255,255,255,.16)}
#body-row{flex:1;display:flex;overflow:hidden}
#sidebar{width:288px;background:var(--panel);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
#sb-tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--pg)}
.sb-tab{flex:1;padding:9px 0;text-align:center;font-size:11px;cursor:pointer;border-bottom:2px solid transparent}
.sb-tab.on{color:var(--navy);border-bottom-color:var(--blue);background:var(--panel)}
.sb-panel{flex:1;overflow-y:auto;padding:10px;display:none}
.sb-panel.on{display:block}
.sc{background:var(--pg);border:1px solid var(--bd);border-radius:7px;padding:10px 12px;margin-bottom:8px}
.sc-title{font-size:10px;font-weight:600;color:var(--navy);text-transform:uppercase;margin-bottom:8px}
.btn{width:100%;padding:8px 12px;border-radius:4px;border:none;cursor:pointer;font-size:12px;font-weight:500;margin-bottom:6px}
.btn-p{background:var(--blue);color:#fff}
.btn-s{background:var(--blue-lt);color:#1D4ED8;border:1px solid var(--blue-bd)}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--bd2)}
.btn-d{background:#FEE2E2;color:#991B1B}
.sb-sel{width:100%;background:var(--panel);border:1px solid var(--bd2);color:var(--t1);border-radius:4px;padding:6px 8px;font-size:12px;margin-bottom:6px}
.upz{border:1.5px dashed var(--blue-bd);border-radius:7px;padding:10px;text-align:center;cursor:pointer;margin-bottom:6px;background:var(--blue-lt)}
.empty{text-align:center;padding:24px 0;color:var(--t3);font-size:11px}
.lbl{font-size:10px;color:var(--t3);margin-bottom:4px}
#legend{position:absolute;right:10px;bottom:26px;z-index:400;background:rgba(255,255,255,.95);border:1px solid var(--bd2);border-radius:7px;padding:9px 12px}
#cbar{height:26px;background:var(--navy);border-top:1px solid var(--navy2);display:flex;align-items:center;padding:0 10px;gap:10px;z-index:500}
.cseg{display:flex;align-items:center;gap:5px}
.clbl{font-size:9px;color:#7AA3CC}
.cval{font-size:10px;color:#E2EAF4;cursor:pointer}
.lrow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.lname{font-size:12px;color:var(--t2);flex:1}
.lck{width:14px;height:14px;cursor:pointer}
.ldot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
</style>
</head>
<body>
<div id="splash">
  <div class="sp-logo">MINERAVIX</div>
  <div class="sp-sub">AI Geo Insight Engine · v4.0</div>
  <div class="sp-msg" id="spm">Memuat sistem...</div>
</div>
<div id="app">
  <div id="topbar">
    <div class="tb-name">MINERAVIX · GEOCEE</div>
    <div style="flex:1"></div>
    <button class="tb-btn" onclick="showHelp()">? Bantuan</button>
  </div>
  <div id="body-row">
    <div id="sidebar">
      <div id="sb-tabs">
        <div class="sb-tab on" onclick="showTab('layer')">Layer</div>
        <div class="sb-tab" onclick="showTab('hasil')">Hasil</div>
      </div>
      <div class="sb-panel on" id="tab-layer">
        <div class="sc">
          <div class="sc-title">Layer Aktif</div>
          <div class="lrow"><input type="checkbox" class="lck" id="ck-mineral" checked onchange="tglLayer('mineral')"><div class="ldot" style="background:var(--mineral)"></div><span class="lname">Mineral</span></div>
          <div class="lrow"><input type="checkbox" class="lck" id="ck-wiup" onchange="tglLayer('wiup')"><div class="ldot" style="background:var(--wiup)"></div><span class="lname">WIUP</span></div>
          <div class="lrow"><input type="checkbox" class="lck" id="ck-batubara" onchange="tglLayer('batubara')"><div class="ldot" style="background:var(--coal)"></div><span class="lname">Batubara</span></div>
        </div>
        <div class="sc">
          <div class="sc-title">Upload Data</div>
          <div class="upz" onclick="trigUp('wiup)"><div>📂 Upload WIUP</div></div>
          <div class="upz" onclick="trigUp('batubara')"><div>🪨 Upload Batubara</div></div>
          <input type="file" id="file-wiup" accept=".geojson,.json" style="display:none" onchange="handleUp(event,'wiup')">
          <input type="file" id="file-batubara" accept=".geojson,.json" style="display:none" onchange="handleUp(event,'batubara')">
          <div id="up-msg" style="font-size:10px;color:var(--t3);margin-top:2px"></div>
        </div>
      </div>
      <div class="sb-panel" id="tab-hasil">
        <div style="font-size:11px;color:var(--t3);margin-bottom:8px"><span id="tot-h">0</span> hasil</div>
        <div id="hasil-list"><div class="empty">Klik polygon di peta</div></div>
      </div>
    </div>
    <div id="map-wrap">
      <div id="map"></div>
      <div id="legend">
        <div style="font-size:9px;font-weight:600;margin-bottom:7px">LEGENDA</div>
        <div style="display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:5px"><div style="width:11px;height:11px;border-radius:2px;background:var(--mineral)"></div>Mineral</div>
        <div style="display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:5px"><div style="width:11px;height:11px;border-radius:2px;background:var(--wiup)"></div>WIUP</div>
        <div style="display:flex;align-items:center;gap:6px;font-size:11px"><div style="width:11px;height:11px;border-radius:2px;background:var(--coal)"></div>Batubara</div>
      </div>
      <div id="cbar">
        <div class="cseg"><span class="clbl">LAT</span><span class="cval" id="clat">—</span></div>
        <div style="width:1px;height:14px;background:rgba(255,255,255,.1)"></div>
        <div class="cseg"><span class="clbl">LON</span><span class="cval" id="clon">—</span></div>
      </div>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let map,LY={},results=[],lastLat=null,lastLon=null;

async function boot(){
  try{
    $('spm').textContent='Inisialisasi peta...';
    await new Promise(res=>{
      if(typeof L!=='undefined')return res();
      const t=setInterval(()=>{if(typeof L!=='undefined'){clearInterval(t);res();}},50);
      setTimeout(()=>{clearInterval(t);res();},3000);
    });
    initMap();
    $('spm').textContent='Memuat data...';
    await loadDef();
    $('spm').textContent='Siap!';
    await new Promise(r=>setTimeout(r,500));
  }catch(e){
    console.error('Boot error:',e);
    $('spm').textContent='Mode manual - upload data via Layer';
    try{if(typeof L!=='undefined'&&!window._mapInit)initMap();}catch(x){}
    await new Promise(r=>setTimeout(r,500));
  }finally{
    $('splash').style.opacity='0';
    $('splash').style.pointerEvents='none';
    $('app').style.display='flex';
  }
}

function initMap(){
  if(window._mapInit)return;
  window._mapInit=true;
  map=L.map('map').setView([-2.5,117.5],5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',attribution:'© CartoDB'}).addTo(map);
  map.on('mousemove',e=>{
    lastLat=e.latlng.lat;lastLon=e.latlng.lng;
    $('clat').textContent=lastLat.toFixed(6);
    $('clon').textContent=lastLon.toFixed(6);
  });
}

async function loadDef(){
  const files=[
    {url:'output/webdata_MINERAL.geojson',nm:'mineral'},
    {url:'output/webdata_WIUP_2024.geojson',nm:'wiup'},
    {url:'webdata_WIUP_2024.geojson',nm:'wiup'},
    {url:'output/webdata_BATUBARA.json',nm:'batubara'},
    {url:'webdata_BATUBARA.json',nm:'batubara'},
  ];
  for(const f of files){
    try{
      const r=await fetch(f.url);
      if(r.ok){
        const d=await r.json();
        if(d&&d.features&&d.features.length>0){
          addLayer(d,f.nm);
          break;
        }
      }
    }catch(e){}
  }
}

function addLayer(data,nm){
  if(LY[nm]){try{map.removeLayer(LY[nm]);}catch(x){}}
  const colors={mineral:'#DC2626',wiup:'#2563EB',batubara:'#78350F'};
  try{
    LY[nm]=L.geoJSON(data,{
      style:{color:colors[nm]||'#64748B',weight:1,fillColor:colors[nm]||'#64748B',fillOpacity:.5},
      onEachFeature:(f,l)=>{
        l.on('click',()=>{
          if(!results.find(r=>r.name===f.properties?.NAMAFOR)){
            results.unshift({name:f.properties?.NAMAFOR||'Unknown'});
            renderH();
          }
        });
      }
    }).addTo(map);
    $('ck-'+nm).checked=true;
  }catch(e){console.error('Layer error:',e);}
}

function tglLayer(nm){
  const ck=$('ck-'+nm);
  if(!LY[nm])return;
  if(ck.checked)map.addLayer(LY[nm]);
  else map.removeLayer(LY[nm]);
}

function trigUp(nm){$('file-'+nm).click();}
function handleUp(evt,nm){
  const file=evt.target.files[0];
  if(!file)return;
  evt.target.value='';
  $('up-msg').textContent='Membaca '+file.name+'...';
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      addLayer(d,nm);
      $('up-msg').textContent='✓ '+file.name+' dimuat';
    }catch(x){
      $('up-msg').textContent='✗ Format tidak valid';
    }
  };
  r.readAsText(file);
}

function renderH(){
  $('tot-h').textContent=results.length;
  $('hasil-list').innerHTML=results.length?results.map(r=>'<div style="padding:8px;border-bottom:1px solid var(--bd)">'+r.name+'</div>').join(''):' <div class="empty">Klik polygon di peta</div>';
}

function showTab(t){
  document.querySelectorAll('.sb-tab').forEach(el=>el.classList.toggle('on',el.textContent.toLowerCase().includes(t)));
  document.querySelectorAll('.sb-panel').forEach(el=>el.classList.toggle('on',el.id.includes(t)));
}

function showHelp(){alert('MINERAVIX v4\n\n1. Upload GeoJSON via Layer tab\n2. Klik polygon untuk select\n3. Lihat hasil di tab Hasil');}

window.addEventListener('load',boot);
</script>
</body>
</html>
